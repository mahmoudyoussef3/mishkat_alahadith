plugins {
    id 'com.android.application'
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
    // END: FlutterFire Configuration
    id 'kotlin-android'
    id 'dev.flutter.flutter-gradle-plugin'
}

// =======================
// Load keystore safely
// =======================
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")

if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.mishkat_almasabih.app"

    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    defaultConfig {
        applicationId "com.mishkat_almasabih.app"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    // =======================
    // SAFE SIGNING CONFIG (FIX path=null issue)
    // =======================
    signingConfigs {
        release {
        if (keystorePropertiesFile.exists()
        && keystoreProperties['storeFile'] != null
        && !keystoreProperties['storeFile'].toString().isEmpty()) {

    storeFile file(keystoreProperties['storeFile'])
    storePassword keystoreProperties['storePassword']
    keyAlias keystoreProperties['keyAlias']
    keyPassword keystoreProperties['keyPassword']
}
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false

            // fallback to debug if keystore missing (CI safe)
            signingConfig signingConfigs.release.storeFile != null
                    ? signingConfigs.release
                    : signingConfigs.debug
        }

        debug {
            // uses default debug keystore
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    // Firebase BoM
    implementation platform("com.google.firebase:firebase-bom:34.5.0")

    // Firebase libs
    implementation "com.google.firebase:firebase-crashlytics-ndk"
    implementation "com.google.firebase:firebase-analytics"
    implementation "com.google.firebase:firebase-perf"
}